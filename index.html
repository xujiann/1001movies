<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>1001 Movies</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#top" aria-label="1001 Movies 首页">
        <span class="brand-mark">1001</span>
        <span>Movies</span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a href="#featured">推荐</a>
        <a href="#categories">分类</a>
        <a href="#library">片库</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-overlay">
          <p class="kicker">精选电影索引</p>
          <h1 id="hero-title">1001 部电影</h1>
          <div class="formula" aria-label="片库结构：1001 等于 13 乘以 11 乘以 7">
            <strong>1001</strong>
            <span>=</span>
            <span>13 大类</span>
            <span>×</span>
            <span>11 小类</span>
            <span>×</span>
            <span>7 部电影</span>
          </div>
          <div class="hero-actions">
            <a class="button primary" href="#library">浏览片库</a>
            <a class="button secondary" href="#categories">查看分类</a>
          </div>
        </div>
      </section>

      <section class="stats-band" aria-label="片库概览">
        <div>
          <strong id="movie-count">1001</strong>
          <span>电影条目</span>
        </div>
        <div>
          <strong id="category-count">13</strong>
          <span>大类</span>
        </div>
        <div>
          <strong id="subcategory-count">143</strong>
          <span>小类（每大类 11 个）</span>
        </div>
        <div>
          <strong id="watched-count">0</strong>
          <span id="progress-label">已看进度</span>
        </div>
      </section>

      <section class="section featured-section" id="featured">
        <div class="section-heading">
          <div>
            <p class="kicker">Today</p>
            <h2>今日推荐</h2>
          </div>
          <button class="icon-button text-button" id="featured-refresh" type="button">换一部</button>
        </div>
        <article class="featured-card" id="featured-card"></article>
      </section>

      <section class="section" id="categories">
        <div class="section-heading">
          <p class="kicker">Catalog</p>
          <h2>13 个入口</h2>
        </div>
        <div class="category-grid" id="category-grid"></div>
      </section>

      <section class="section library-section" id="library">
        <div class="section-heading library-heading">
          <div>
            <p class="kicker">Library</p>
            <h2>电影片库</h2>
          </div>
          <button class="icon-button text-button filter-toggle" id="filter-toggle" type="button" aria-expanded="true" aria-controls="library-toolbar">筛选</button>
          <div class="toolbar" id="library-toolbar" role="search">
            <div class="view-toggle" aria-label="视图切换">
              <button class="icon-button text-button active" id="grid-view-button" type="button">海报</button>
              <button class="icon-button text-button" id="list-view-button" type="button">列表</button>
            </div>
            <input id="search-input" type="search" placeholder="搜索片名、分类或标签" aria-label="搜索片库">
            <select id="category-filter" aria-label="按大类筛选"></select>
            <select id="genre-filter" aria-label="按类型筛选"></select>
            <select id="decade-filter" aria-label="按年代筛选"></select>
            <select id="status-filter" aria-label="按观影状态筛选">
              <option value="全部">全部状态</option>
              <option value="收藏">已收藏</option>
              <option value="已看">已看</option>
              <option value="未看">未看</option>
            </select>
            <select id="sort-filter" aria-label="排序方式">
              <option value="number">片单顺序</option>
              <option value="title">片名 A-Z</option>
              <option value="year-asc">年份从早到晚</option>
              <option value="year-desc">年份从晚到早</option>
            </select>
            <button class="icon-button text-button" id="random-button" type="button">随机一部</button>
            <button class="icon-button text-button" id="clear-button" type="button">清空筛选</button>
          </div>
        </div>
        <div class="subnav" id="subnav" aria-label="小类筛选"></div>
        <div class="active-filters" id="active-filters" aria-label="当前筛选"></div>
        <p class="result-count" id="result-count" aria-live="polite"></p>
        <div class="movie-grid" id="movie-grid"></div>
        <div class="empty-state" id="empty-state" hidden>
          <p>没有找到匹配的电影。</p>
          <button class="icon-button text-button" id="empty-clear-button" type="button">清空筛选</button>
        </div>
      </section>
    </main>

    <button class="to-top" id="to-top" type="button" aria-label="回到顶部">↑</button>

    <dialog class="movie-dialog" id="movie-dialog" aria-labelledby="dialog-title">
      <button class="dialog-close" id="dialog-close" type="button" aria-label="关闭详情">×</button>
      <div class="dialog-poster" id="dialog-poster"></div>
      <div class="dialog-body">
        <p class="kicker" id="dialog-number"></p>
        <h2 id="dialog-title"></h2>
        <div class="dialog-meta" id="dialog-meta"></div>
        <p id="dialog-note"></p>
        <div class="dialog-actions">
          <button class="icon-button text-button" id="dialog-prev" type="button">上一部</button>
          <button class="icon-button text-button" id="dialog-next" type="button">下一部</button>
          <button class="icon-button text-button" id="dialog-share" type="button">复制链接</button>
          <button class="icon-button text-button" id="dialog-favorite" type="button">收藏</button>
          <button class="icon-button text-button" id="dialog-watched" type="button">标记已看</button>
        </div>
      </div>
    </dialog>

    <script src="data/movies.js"></script>
    <script src="app.js"></script>
  </body>
</html>
