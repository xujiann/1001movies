name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Audit movie data
        run: node scripts/audit-movie-data.js

      - name: Prepare production artifact
        run: |
          mkdir -p _site/data
          cp index.html en.html zh.html app.js styles.css favicon.svg robots.txt sitemap.xml .nojekyll _site/
          node scripts/minify-movie-data.js data/movies.js _site/data/movies.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
